            sans: ['"Noto Sans"', 'sans-serif'],
          }
        }

  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col overflow-hidden">
  
  <!-- Navigation Header -->
  <header class="bg-white shadow-sm flex-none py-4 px-6 md:px-12 flex justify-between items-center transition-all duration-300 ease-in-out z-10 relative">

  <!-- PDF Native Viewer Container -->
  <main class="flex-grow w-full relative border-t border-gray-200" style="-webkit-overflow-scrolling: touch;">

          <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">

          <p class="text-gray-600 mb-6 max-w-md">Your device or browser does not support inline PDFs. You can download the file to view it.</p>
          <a href="CV.pdf" download="Tade_Marozsak_CV.pdf" class="inline-block bg-gray-800 hover:bg-black text-white font-semibold py-3 px-8 rounded-lg transition-colors shadow-md">Download CV</a>
